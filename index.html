<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE PERIODIC TABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@500;700&display=swap');
        body { 
            background: linear-gradient(135deg, #05050f, #0f0f1f, #1a1a2e); 
            color: #e0f2fe; 
            font-family: 'Inter', system-ui, sans-serif; 
            overflow-x: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .cosmic-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at 40% 30%, rgba(103,232,249,0.25) 0%, rgba(0,245,255,0.18) 50%, transparent 85%); 
            z-index: -1; 
            animation: nebula 35s infinite alternate ease-in-out; 
        }
        @keyframes nebula { 
            0% { opacity: 0.92; } 
            100% { opacity: 1; } 
        }
        
        h1 { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 25px #00f5ff, 0 0 50px #67e8f9; color: #ffffff; }
        
        .main-wrapper {
            width: 100%;
            max-width: 1480px;
            margin: 0 auto;
        }
        
        .periodic-table { 
            display: grid; 
            grid-template-columns: repeat(18, 64px); 
            gap: 6px; 
            padding: 40px 30px; 
            margin: 0 auto;
        }
        .element { 
            width: 64px; height: 64px; 
            background: rgba(15, 23, 42, 0.95); 
            border: 2px solid #67e8f9; 
            border-radius: 12px; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            cursor: pointer; 
            transition: all 0.35s cubic-bezier(0.23, 1.0, 0.32, 1); 
            box-shadow: 0 0 12px rgba(103,232,249,0.5), inset 0 0 10px rgba(0,245,255,0.2); 
            position: relative; 
            overflow: hidden; 
        }
        .element::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(103,232,249,0.25), rgba(0,245,255,0.15), transparent);
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.35s;
        }
        .element:hover::before { opacity: 1; }
        
        .element:hover { 
            transform: scale(1.28) translateY(-5px); 
            /* box-shadow: 0 0 35px #00f5ff, 0 0 70px #67e8f9; 
            border-color: #00f5ff;  */
            z-index: 30; 
        }
        .element .number { position: absolute; top: 3px; left: 5px; font-size: 11px; color: #85effd; font-weight: 900; text-shadow: 0 0 5px #3d3d3d; }
        .element .symbol { font-size: 22px; font-weight: 700; color: #ffffff; letter-spacing: -1.0px; text-shadow: 0 0 8px #6ca9b1; margin-top: 6px;  }
        .element .mass { font-size: 10px; color: #bae6fd; margin-top: 1px; }
        
        .spacer {
            width: 64px; height: 64px; 
            visibility: hidden;
        }
        
        .fblock-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            padding-left: 140px;
            max-width: 1480px;
            margin: 0 auto;
        }
        
        .fblock-label {
            text-align: center;
            color: #67e8f9;
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 8px;
            letter-spacing: 1px;
            width: 100%;
        }
        
        .holo-popup { 
            position: fixed; 
            background: rgba(15,23,42,0.98); 
            border: 3px solid #00f5ff; 
            box-shadow: 0 0 40px #67e8f9, 0 0 80px rgba(0,245,255,0.6); 
            border-radius: 16px; 
            padding: 22px; 
            max-width: 360px; 
            z-index: 70; 
            pointer-events: auto; 
            animation: holoFloat 2.8s infinite ease-in-out; 
        }
        @keyframes holoFloat { 
            0%,100% { transform: translateY(0) rotate(0.4deg); } 
            50% { transform: translateY(-10px) rotate(-0.4deg); } 
        }
        
        .modal-content { 
            background: linear-gradient(180deg, #0f172a, #1e2937); 
            border: 3px solid #00f5ff; 
            box-shadow: 0 0 50px #67e8f9, 0 0 100px rgba(0,245,255,0.5); 
        }
        
        .avogadro-btn {
            background: #000;
            border: 2px solid #67e8f9;
            color: #fff;
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .avogadro-btn:hover {
            background: #67e8f9;
            color: #000;
        }
    </style>
</head>

        function createElementDiv(el) {
            const div = document.createElement('div');
            div.className = 'element';
            div.innerHTML = `
                <div class="number">${el.number}</div>
                <div class="symbol">${el.symbol}</div>
                <div class="mass">${el.mass}</div>
            `;

            const originalColor = "#67e8f9";
            div.style.borderColor = originalColor;
            div.style.boxShadow = `0 0 12px ${originalColor}`;

            div.onmouseover = (e) => {
                const groupColor = GROUP_COLORS[el.group] || originalColor;
                div.style.borderColor = groupColor;
                div.style.boxShadow = `0 0 20px ${groupColor}, 0 0 40px ${groupColor}`;
                showHoloPopup(e, el);
            },
            div.onmouseout = () => {
                div.style.borderColor = originalColor;
                div.style.boxShadow = `0 0 12px ${originalColor}`;
                hideHoloPopup();
            },
            div.onclick = () => showCrystalModal(el);
            
            return div;
        }

            return div;
        }

        // CREATE ELEMENTS

        function createElements() {
            const container = document.getElementById('grid-mode');
            container.innerHTML = '';

            const mainWrapper = document.createElement('div');
            mainWrapper.className = 'main-wrapper';
            container.appendChild(mainWrapper);

            const mainTable = document.createElement('div');
            mainTable.className = 'periodic-table';
            mainWrapper.appendChild(mainTable);

            // Period 1
            mainTable.appendChild(createElementDiv(elements[0]));
            for (let i = 0; i < 16; i++) mainTable.appendChild(createSpacer());
            mainTable.appendChild(createElementDiv(elements[1]));

            // Period 2
            mainTable.appendChild(createElementDiv(elements[2]));
            mainTable.appendChild(createElementDiv(elements[3]));
            for (let i = 0; i < 10; i++) mainTable.appendChild(createSpacer());
            for (let i = 4; i < 10; i++) mainTable.appendChild(createElementDiv(elements[i]));

            // Period 3
            mainTable.appendChild(createElementDiv(elements[10]));
            mainTable.appendChild(createElementDiv(elements[11]));
            for (let i = 0; i < 10; i++) mainTable.appendChild(createSpacer());
            for (let i = 12; i < 18; i++) mainTable.appendChild(createElementDiv(elements[i]));

            // Period 4
            for (let i = 18; i < 36; i++) mainTable.appendChild(createElementDiv(elements[i]));

            // Period 5
            for (let i = 36; i < 54; i++) mainTable.appendChild(createElementDiv(elements[i]));

            // Period 6
            mainTable.appendChild(createElementDiv(elements[54]));
            mainTable.appendChild(createElementDiv(elements[55]));
            mainTable.appendChild(createSpacer());
            for (let i = 71; i < 86; i++) mainTable.appendChild(createElementDiv(elements[i]));

            // Period 7
            mainTable.appendChild(createElementDiv(elements[86]));
            mainTable.appendChild(createElementDiv(elements[87]));
            mainTable.appendChild(createSpacer());
            for (let i = 103; i < 118; i++) mainTable.appendChild(createElementDiv(elements[i]));

            // Lanthanides row (57-71) - full size
            const lanHeader = document.createElement('div');
            lanHeader.className = 'fblock-label';
            lanHeader.textContent = '57 — 71   LANTHANIDES';
            mainWrapper.appendChild(lanHeader);

            const lanRow = document.createElement('div');
            lanRow.className = 'fblock-row';
            for (let i = 56; i <= 70; i++) lanRow.appendChild(createElementDiv(elements[i]));
            mainWrapper.appendChild(lanRow);

            // Actinides row (89-103) - full size, Ac and Th included
            const actHeader = document.createElement('div');
            actHeader.className = 'fblock-label';
            actHeader.textContent = '89 — 103   ACTINIDES';
            mainWrapper.appendChild(actHeader);

            const actRow = document.createElement('div');
            actRow.className = 'fblock-row';
            for (let i = 88; i <= 102; i++) actRow.appendChild(createElementDiv(elements[i]));
            mainWrapper.appendChild(actRow);
        }

        function showHoloPopup(e, el) {
            if (hideTimeout) clearTimeout(hideTimeout);
            const popup = document.getElementById('holo-popup');
            const groupColor = GROUP_COLORS[el.group] || "#67e8f9"
            popup.innerHTML = `
                <div class="flex items-center gap-4 mb-3">
                    <span class="text-5xl font-bold text-cyan-300">${el.symbol}</span>
                    <div>
                        <div class="text-white">${el.number} — ${el.name}</div>
                        <div class="text-xs text-cyan-200">Mass: ${el.mass} u</div>
                    </div>
                </div>
                <div class="text-xs leading-snug text-slate-300">${el.notes}</div>
            `;

            // Position Near Cursor
            popup.style.left = `${e.pageX + 30}px`;
            popup.style.top = `${e.pageY - 160}px`;
            popup.classList.remove('hidden');

            // Glow Effect = Group Color
            popup.style.border = `2px solid ${groupColor}`;
            popup.style.boxShadow = `0 0 20px ${groupColor}33, 0 0 40px ${groupColor}22`;
            pop.classList.remove('hidden');
            // Keep Popup Visible While Hovering Over
            popup.onmouseenter = () => { if (hideTimeout) clearTimeout(hideTimeout); };
            popup.onmouseleave = hideHoloPopup;
        }

        function hideHoloPopup() {
            if (hideTimeout) clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                const popup = documnet.getElementById('holo-popup');
                popup.classList.add('hidden');
            }, 180);
        }

        function showCrystalModal(el) {
            currentElement = el;
            const modal = document.getElementById('modal');
            document.getElementById('modal-title').innerHTML = `${el.number} — <span class="text-cyan-300">${el.symbol}</span> <span class="text-2xl">${el.name}</span>`;
            
            document.getElementById('modal-notes').innerHTML = `
                <div><strong class="text-cyan-300">Atomic Structure:</strong><br>
                    Nucleus + Electron Orbitals</div>
                    <div><strong class="text-cyan-300">Properties:</strong><br>${el.notes}</div>
            `;

            modal.classList.remove('hidden');

            setTimeout(() => {
                const container = document.getElementById('three-canvas');
                container.innerHTML = '';

                const width = container.clientWidth || 820;
                const height = 460;

                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 200);
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(width, height);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0x67e8f9, 1.2));

                const light = new THREE.PointLight(0x00f5ff, 3, 200);
                light.position.set(20, 20, 20);
                scene.add(light);

                const atom = new THREE.Group();

                // NUCLEUS
                const nucleusGeo = new THREE.SphereGeometry(2.2, 32, 32);
                const nucleusMat = new THREE.MeshPhongMaterial({
                    color: 0x00f5ff,
                    emissive: 0x67e8f9,
                    shininess: 100
                });

                const nucleus = new THREE.Mesh(nucleusGeo, nucleusMat);
                atom.add(nucleus);

                // ELECTRON ORBITS
                const electronCount = Math.min(el.number, 20);
                const orbitRadii = [4, 6, 8];

                let electronsPlaced = 0;

                orbitRadii.forEach((radius, orbitIndex) => {
                    const orbit = new THREE.RingGeometry(radius, radius + 0.05, 64);
                    const orbitMat = new THREE.MeshBasicMaterial({
                        color: 0x67e8f9,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.4
                    });

                    const ring = new THREE.Mesh(orbit, orbitMat);
                    ring.rotation.x = Math.PI / 2;
                    atom.add(ring);

                    const electronsInOrbit = Math.min(electronCount - electronsPlaced, 8);

                    for (let i = 0; i < electronsInOrbit; i++) {
                        const angle = (i / electronsInOrbit) * Math.PI * 2;

                        const electronGeo = new THREE.SphereGeometry(0.35,16, 16);
                        const electronMat = new THREE.MeshBasicMaterial({ color: 0xffffff});

                        const electron = new THREE.Mesh(electronGeo, electronMat);
                        electron.userData = { angle, radius, speed: 0.01 + Math.random() * 0.01 };

                        electron.position.x = Math.cos(angle) * radius;
                        electron.position.z = Math.sin(angle) * radius;

                        atom.add(electron);
                    }

                    electronsPlaced += electronsInOrbit;
                });
             scene.add(atom);
             camera.position.set(0, 6, 18);
             camera.lookAt(0, 0, 0);

             function animate () {
                animationFrameId = requestAnimationFrame(animate);

                atom.rotation.y += 0.002;

                atom.children.forEach(obj => {
                    if (obj.userData?.angle !== undefined) {
                        obj.userData.angle += obj.userData.speed;
                        obj.position.x = Math.cos(obj.userData.angle) * obj.userData.radius;
                        obj.position.z = Math.sin(obj.userData.angle) * obj.userData.radius;
                    }
                });

                renderer.render(scene, camera);
            }

            console.log("Scene created:", scene);
            console.log("Atom children:", atom.children.length);

            animate();
        }, 80);
    }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (renderer) renderer.dispose();
            currentElement = null;
        }

        function exportToXYZ() {
            if (!currentElement) return;
            const symbol = currentElement.symbol;
            let xyzContent = `${currentElement.number}
${symbol} atomic model
`;
            // simple nucleus + electrons mock layout
            xyzContent += `${symbol} 0.000 0.000 0.000\n`;

            for (let i = 0; i < Math.min(currentElement.number, 10); i++) {
                xyzContent += `e ${Math.random()*5} ${Math.random()*5} ${Math.random()*5}\n`;
            }

            const blob = new Blob([xyzContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${symbol}_atomic_structure.xyz`;
            a.click();
            URL.revokeObjectURL(url);
            alert(`✅ Exported ${symbol}_atomic_structure.xyz

Open in Avogadro for full modeling and material design.`);
        }

        function openAvogadroHelp() {
            window.open('https://avogadro.cc', '_blank');
        }

        window.onload = () => {
            createElements();
            console.log('%c🌌 COSMIC PERIODIC TABLE — Fully centered + Avogadro export ready!', 'color:#67e8f9; font-size:16px; font-weight:700;');
        };
